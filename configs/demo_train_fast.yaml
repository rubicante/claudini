# Demo track: fast local iteration (MPS/CPU). Lower budget + float16 + prefix cache.
model: openai-community/gpt2
optim_length: 15
max_flops: 1.0e+14
dtype: float16
system_prompt: ""
samples: [0, 1, 2]
seeds: [0]
final_input: tokens
use_prefix_cache: true

input_spec:
  source:
    type: random
    query_len: 0
    target_len: 10
  layout:
    type: suffix
  init:
    type: random

method_kwargs:
  gcg: { num_candidates: 64, topk_per_position: 64 }
  i_gcg: { num_candidates: 64, topk_per_position: 64 }
  acg: { num_candidates: 64 }
