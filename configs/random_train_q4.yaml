# Random targets track: 4-bit NF4 quantized variant.
# Same as random_train but with load_in_4bit for cheaper GPU runs (~8GB VRAM).
optim_length: 15
max_flops: 1.0e+15
dtype: bfloat16
load_in_4bit: true
system_prompt: ""
samples: [0, 1, 2, 3, 4]
seeds: [0]
final_input: tokens
use_prefix_cache: true
model: Qwen/Qwen2.5-7B-Instruct

input_spec:
  source:
    type: random
    query_len: 0
    target_len: 10
  layout:
    type: suffix
  init:
    type: random
